<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Side-Scroll Brawler</title>
  <style>
    html,body { height:100%; margin:0; background:#222; }
    canvas {
      border: 1px solid #000;
      display: block;
      margin: 24px auto;
      background: #333;
    }
  </style>
</head>
<body>
  <!-- ゲーム画面 -->
  <canvas id="gameCanvas" width="1280" height="720"></canvas>

  <!-- 攻撃効果音 -->
  <audio id="hitSound1" src="1punch.mp3"></audio>
  <audio id="hitSound2" src="2punch.mp3"></audio>
  <audio id="hitSound3" src="3punch.mp3"></audio>

  <!-- 敵撃破効果音 -->
  <audio id="enemyExplosion" src="explosion.mp3"></audio>

  <script>
    // 基本設定
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let keys = {};
    window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
    window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

    let cameraX = 0;
    let stageClear = false;
    let clearDistance = 0;
    let score = 0;
    let waveNumber = 1; // ステージ（波）番号
    let spawnOffset = 800; // 右端からの出現オフセット

    // 背景描画
    function drawBackground() {
      ctx.fillStyle = "#444";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#666";
      for (let i = -cameraX % 200; i < canvas.width; i += 200) {
        ctx.fillRect(i, 100, 100, 20);
        ctx.fillRect(i, 400, 150, 30);
      }
    }

    // ====================== Player Class ======================
    class Player {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 60;
        this.height = 60;
        this.speed = 6;
        this.hp = 100;
        this.isAttacking = false;
        this.attackTimer = 0;
        this.comboStep = 0;
        this.invincible = false;
        this.dashSpeed = 12;
        this.comboResetTimer = 0;
      }

      update(enemies) {
        if (!stageClear) {
          let dx = 0, dy = 0;
          if (keys["a"] || keys["arrowleft"]) dx -= this.speed;
          if (keys["d"] || keys["arrowright"]) dx += this.speed;
          if (keys["w"] || keys["arrowup"]) dy -= this.speed;
          if (keys["s"] || keys["arrowdown"]) dy += this.speed;

          if (!this.isAttacking) {
            this.x += dx;
            this.y += dy;
          }

          // 攻撃中の挙動（ダッシュや無敵）
          if (this.isAttacking) {
            this.attackTimer--;

            if (this.comboStep === 1) {
              this.invincible = true;
              let target = this.findFrontEnemy(enemies);
              if (target) {
                let dirX = Math.sign(target.x - this.x);
                let dirY = Math.sign(target.y - this.y);
                if (!this.checkCollision(target)) {
                  this.x += dirX * this.dashSpeed;
                  this.y += dirY * (this.dashSpeed / 2);
                } else {
                  target.takeDamage(10);
                  if (target.isDead()) score += 100;
                  this.isAttacking = false;
                }
              }
            }

            if (this.comboStep === 2) {
              this.invincible = true;
            }

            if (this.attackTimer <= 0) {
              this.isAttacking = false;
              this.invincible = false;
              this.comboStep = (this.comboStep + 1) % 3;
              this.comboResetTimer = 180;
            }
          } else {
            if (this.comboResetTimer > 0) {
              this.comboResetTimer--;
              if (this.comboResetTimer === 0) {
                this.comboStep = 0;
              }
            }
          }
        } else {
          // ステージクリア時は自動で右へ進む（演出）
          this.x += this.speed;
          clearDistance += this.speed;
        }

        cameraX = this.x - canvas.width / 2;
      }

      findFrontEnemy(enemies) {
        if (!enemies || enemies.length === 0) return null;
        let candidates = enemies.filter(e => !e.isDead() && e.x > this.x);
        if (candidates.length === 0) return null;
        let nearest = candidates[0];
        let minDist = Math.hypot(this.x - nearest.x, this.y - nearest.y);
        for (let e of candidates) {
          let dist = Math.hypot(this.x - e.x, this.y - e.y);
          if (dist < minDist) {
            minDist = dist;
            nearest = e;
          }
        }
        return nearest;
      }
      attack(enemies) {
        if (!this.isAttacking && !stageClear) {
          this.isAttacking = true;
          this.attackTimer = 15;

          // コンボごとに違う効果音
          let soundId = this.comboStep === 0 ? "hitSound1" :
                        this.comboStep === 1 ? "hitSound2" : "hitSound3";

          enemies.forEach(e => {
            if (!e.isDead() && this.checkHit(e)) {
              e.takeDamage(10, 1);
              if (e.isDead()) score += 100;
              const audio = document.getElementById(soundId);
              if (audio) {
                audio.currentTime = 0;
                audio.play();
              }
            }
          });
        }
      }

      checkHit(enemy) {
        let attackBox;
        if (this.comboStep === 0) {
          attackBox = {x: this.x + 60, y: this.y + 15, w: 80, h: 20};
        } else if (this.comboStep === 1) {
          attackBox = {x: this.x + 40, y: this.y - 30, w: 30, h: 120};
        } else {
          attackBox = {x: this.x + 60, y: this.y - 40, w: 90, h: 40};
        }
        return !(enemy.x > attackBox.x + attackBox.w ||
                 enemy.x + enemy.width < attackBox.x ||
                 enemy.y > attackBox.y + attackBox.h ||
                 enemy.y + enemy.height < attackBox.y);
      }

      checkCollision(obj) {
        return !(this.x > obj.x + obj.width ||
                 this.x + this.width < obj.x ||
                 this.y > obj.y + obj.height ||
                 this.y + this.height < obj.y);
      }

      takeDamage(amount) {
        if (!this.invincible) {
          this.hp -= amount;
        }
      }

      draw() {
        // 胴体
        ctx.fillStyle = this.invincible ? "cyan" : "blue";
        ctx.fillRect(this.x - cameraX, this.y, this.width, this.height);

        // 目
        ctx.fillStyle = "white";
        ctx.fillRect(this.x - cameraX + 15, this.y + 15, 15, 15);
        ctx.fillRect(this.x - cameraX + 35, this.y + 15, 15, 15);
        ctx.fillStyle = "black";
        ctx.fillRect(this.x - cameraX + 20, this.y + 20, 5, 5);
        ctx.fillRect(this.x - cameraX + 40, this.y + 20, 5, 5);

        // HPバー
        ctx.fillStyle = "lime";
        ctx.fillRect(20, 20, Math.max(0, this.hp) * 2, 20);

        // スコア表示
        ctx.fillStyle = "white";
        ctx.font = "20px Arial";
        ctx.fillText("Score: " + score, 20, 60);
        ctx.fillText("Wave: " + waveNumber, 20, 90);

        // 攻撃エフェクト
        if (this.isAttacking) {
          ctx.fillStyle = "red";
          if (this.comboStep === 0) {
            ctx.fillRect(this.x - cameraX + 60, this.y + 15, 80, 20);
          } else if (this.comboStep === 1) {
            ctx.fillRect(this.x - cameraX + 40, this.y - 30, 30, 120);
          } else if (this.comboStep === 2) {
            ctx.fillRect(this.x - cameraX + 60, this.y - 40, 90, 40);
          }
        }
      }
    }

    // ====================== Enemy Class ======================
    class Enemy {
      constructor(x, y, speed = 1.8, hp = 50) {
        this.x = x;
        this.y = y;
        this.width = 50;
        this.height = 80;
        this.hp = hp;
        this.speed = speed;
        this.attackCooldown = 0;
        this.deadFlag = false;
      }

      update(player, enemies) {
        if (this.hp <= 0) return;

        // プレイヤーに近づく
        if (this.x > player.x + 50) this.x -= this.speed;
        else if (this.x < player.x - 50) this.x += this.speed;
        if (this.y > player.y + 20) this.y -= this.speed;
        else if (this.y < player.y - 20) this.y += this.speed;

        // 他の敵と重ならないように
        enemies.forEach(other => {
          if (other !== this && !other.isDead()) {
            if (this.checkCollision(other)) {
              if (this.x < other.x) this.x -= 1;
              else this.x += 1;
              if (this.y < other.y) this.y -= 1;
              else this.y += 1;
            }
          }
        });

        // 攻撃
        if (this.attackCooldown > 0) {
          this.attackCooldown--;
        } else {
          if (this.checkCollision(player)) {
            player.takeDamage(5);
            this.attackCooldown = 60;
          }
        }
      }

      checkCollision(obj) {
        return !(this.x > obj.x + obj.width ||
                 this.x + this.width < obj.x ||
                 this.y > obj.y + obj.height ||
                 this.y + this.height < obj.y);
      }

      takeDamage(amount, knockbackDir = 0) {
        this.hp -= amount;
        if (this.hp <= 0 && !this.deadFlag) {
          this.deadFlag = true;
          score += 100;
          effects.push(new Effect(this.x, this.y)); // 撃破エフェクト追加
          const ex = document.getElementById("enemyExplosion");
          if (ex) {
            ex.currentTime = 0;
            ex.play();
          }
        }
        if (knockbackDir !== 0) {
          this.x += knockbackDir * 30;
        }
      }

      isDead() {
        return this.hp <= 0;
      }

      draw() {
        if (this.hp > 0) {
          ctx.fillStyle = "#cc2222";
          ctx.fillRect(this.x - cameraX, this.y, this.width, this.height);

          ctx.fillStyle = "yellow";
          ctx.fillRect(this.x - cameraX + 15, this.y + 25, 8, 8);
          ctx.fillRect(this.x - cameraX + 30, this.y + 25, 8, 8);

          const barWidth = (this.hp / 50) * this.width;
          ctx.fillStyle = this.hp > 20 ? "#ffdd44" : "#ff4444";
          ctx.fillRect(this.x - cameraX, this.y - 12, barWidth, 6);
        }
      }
    }

    // ====================== Effect Class ======================
    let effects = [];

    class Effect {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.timer = 30; // 表示フレーム数
      }

      update() {
        this.timer--;
      }

      draw() {
        if (this.timer > 0) {
          ctx.fillStyle = "orange";
          ctx.beginPath();
          ctx.arc(this.x - cameraX, this.y, 40 - this.timer, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      isFinished() {
        return this.timer <= 0;
      }
    }

    // ====================== 出現ロジック（右端から新しい敵を出す） ======================
    function spawnWave(wave) {
      const baseX = player.x + canvas.width + spawnOffset;
      const count = Math.min(6, 1 + wave); // 波ごとに増えるが上限を設定
      for (let i = 0; i < count; i++) {
        const x = baseX + i * 180 + Math.random() * 80;
        const y = 120 + Math.random() * (canvas.height - 240);
        const speed = 1.2 + 0.2 * wave + Math.random() * 0.6;
        const hp = 40 + wave * 10;
        enemies.push(new Enemy(x, y, speed, hp));
      }
    }

    // ====================== Game Setup ======================
    let player = new Player(100, 100);
    let enemies = [];
    spawnWave(waveNumber); // 最初の波を出現させる

    window.addEventListener("keydown", e => {
      if (e.code === "Space") player.attack(enemies);
    });

    // ====================== Game Loop ======================
    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();

      // プレイヤー更新・描画
      player.update(enemies);
      player.draw();

      // 敵更新・描画
      enemies.forEach(e => {
        if (!e.isDead()) {
          e.update(player, enemies);
          e.draw();
        }
      });

      // エフェクト更新・描画
      effects.forEach(effect => {
        effect.update();
        effect.draw();
      });
      effects = effects.filter(e => !e.isFinished());

      // ステージクリア判定：全ての敵が死んでいるかどうか
      if (!stageClear && enemies.length > 0 && enemies.every(e => e.isDead())) {
        stageClear = true;
        clearDistance = 0;
      }

      // ステージクリア時の演出と次ステージ開始処理
      if (stageClear) {
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.fillText("Stage Clear!", canvas.width / 2 - 140, canvas.height / 2 - 20);

        // プレイヤーが自動で右へ進む演出
        clearDistance += player.speed;

        // 一定距離進んだら次の波を出現させる
        if (clearDistance > 600) {
          waveNumber++;
          // 既存の死んだ敵を取り除く
          enemies = enemies.filter(e => !e.isDead());
          // 次の波を右端から出現させる
          spawnWave(waveNumber);
          stageClear = false;
        }
      }

      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
